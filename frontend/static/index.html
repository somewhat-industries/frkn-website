<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRKN — Карта интернет-свободы России</title>
  <meta name="description" content="Краудсорсинговая карта: где в России работает белый список РКН, где нет интернета, где всё нормально.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <span class="logo">FRKN</span>
      <span class="tagline">карта интернет-свободы</span>
    </div>
    <div id="stats">
      <div class="stat">
        <span class="stat-value" id="stat-total">—</span>
        <span class="stat-label">всего отчётов</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="stat-24h">—</span>
        <span class="stat-label">за 24 часа</span>
      </div>
    </div>
    <a class="app-badge" href="https://apps.apple.com/app/id6760332605" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.54 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="currentColor"/>
      </svg>
      <span>App Store</span>
    </a>
  </header>

  <div id="vpn-notice">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7v5c0 5.25 4.2 10.15 10 11 5.8-.85 10-5.75 10-11V7L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>Для точных данных — отключите VPN перед тестом в приложении</span>
    <button id="vpn-notice-close" aria-label="Закрыть">×</button>
  </div>

  <div id="map"></div>

  <div id="search-control">
    <div id="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="text" placeholder="Поиск города..." autocomplete="off" spellcheck="false">
      <button id="locate-btn" title="Моё местоположение">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
    <ul id="search-results" class="hidden"></ul>
  </div>

  <div id="legend">
    <div class="legend-title">Результат теста</div>
    <div class="legend-item">
      <span class="dot" style="background:#C44D4D"></span>
      <span>Белый список активен</span>
    </div>

    <div class="legend-item">
      <span class="dot" style="background:#4A8B6E"></span>
      <span>Обычная фильтрация</span>
    </div>
    <div class="legend-item">
      <span class="dot" style="background:#415A80"></span>
      <span>Всё работает</span>
    </div>
    <div class="legend-note">Данные только с мобильных сетей, без VPN</div>
  </div>

  <div id="loading" class="hidden">
    <div class="spinner"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="map.js"></script>
</body>
</html>
